<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片轮转示例（增强版）</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: radial-gradient(circle at top, #1e293b, var(--bg));
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .carousel {
            width: min(860px, 100%);
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }

        .viewport {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #020617;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity .45s ease;
            pointer-events: none;
        }

        .slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.7);
            color: #fff;
            cursor: pointer;
        }

        .arrow:hover { background: rgba(30, 41, 59, 0.9); }
        .arrow.left { left: 12px; }
        .arrow.right { right: 12px; }

        .panel {
            padding: 14px 16px 16px;
            background: var(--card);
            border-top: 1px solid rgba(148, 163, 184, 0.2);
        }

        .caption {
            margin: 0 0 10px;
            color: var(--text);
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid #64748b;
            background: transparent;
            cursor: pointer;
            padding: 0;
        }

        .dot.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            background: var(--primary);
            color: white;
            cursor: pointer;
        }

        .btn:hover { background: var(--primary-hover); }

        .tip {
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <section class="carousel" aria-label="图片轮转案例">
        <div class="viewport" id="viewport">
            <button class="arrow left" id="prevBtn" aria-label="上一张" type="button">◀</button>
            <button class="arrow right" id="nextBtn" aria-label="下一张" type="button">▶</button>

            <figure class="slide active"><img src="flower.png" alt="花朵图片示例"></figure>
            <figure class="slide"><img src="html5.jpg" alt="HTML5 图片示例"></figure>
            <figure class="slide"><img src="vp_poster.jpg" alt="视频海报图示例"></figure>
        </div>

        <div class="panel">
            <p class="caption" id="caption" aria-live="polite">示例 1/3：flower.png</p>
            <div class="toolbar">
                <div class="dots" id="dots" aria-label="轮转指示器"></div>
                <div class="actions">
                    <button class="btn" id="toggleBtn" type="button">暂停自动轮转</button>
                </div>
            </div>
            <div class="tip">支持自动轮转、点击切换、键盘方向键切换，鼠标悬停时自动暂停。</div>
        </div>
    </section>

    <script>
        (function () {
            var slides = Array.prototype.slice.call(document.querySelectorAll('.slide'));
            var dotsWrap = document.getElementById('dots');
            var caption = document.getElementById('caption');
            var toggleBtn = document.getElementById('toggleBtn');
            var viewport = document.getElementById('viewport');
            var prevBtn = document.getElementById('prevBtn');
            var nextBtn = document.getElementById('nextBtn');
            var names = ['flower.png', 'html5.jpg', 'vp_poster.jpg'];

            var index = 0;
            var timer = null;
            var intervalMs = 2500;
            var playing = true;

            function buildDots() {
                names.forEach(function (_, i) {
                    var dot = document.createElement('button');
                    dot.type = 'button';
                    dot.className = 'dot' + (i === 0 ? ' active' : '');
                    dot.setAttribute('aria-label', '跳转到第 ' + (i + 1) + ' 张');
                    dot.onclick = function () {
                        go(i);
                        restart();
                    };
                    dotsWrap.appendChild(dot);
                });
            }

            function render() {
                slides.forEach(function (el, i) {
                    el.classList.toggle('active', i === index);
                });
                Array.prototype.forEach.call(dotsWrap.children, function (dot, i) {
                    dot.classList.toggle('active', i === index);
                });
                caption.textContent = '示例 ' + (index + 1) + '/' + names.length + '：' + names[index];
            }

            function go(i) {
                index = (i + names.length) % names.length;
                render();
            }

            function next() { go(index + 1); }
            function prev() { go(index - 1); }

            function start() {
                if (timer) {
                    clearInterval(timer);
                }
                timer = setInterval(next, intervalMs);
                playing = true;
                toggleBtn.textContent = '暂停自动轮转';
            }

            function stop() {
                clearInterval(timer);
                timer = null;
                playing = false;
                toggleBtn.textContent = '继续自动轮转';
            }

            function restart() {
                if (playing) {
                    start();
                }
            }

            prevBtn.onclick = function () { prev(); restart(); };
            nextBtn.onclick = function () { next(); restart(); };

            toggleBtn.onclick = function () {
                if (playing) {
                    stop();
                } else {
                    start();
                }
            };

            viewport.addEventListener('mouseenter', function () {
                if (playing) {
                    stop();
                    toggleBtn.textContent = '继续自动轮转（悬停暂停）';
                }
            });

            viewport.addEventListener('mouseleave', function () {
                if (!playing) {
                    start();
                }
            });

            document.addEventListener('keydown', function (e) {
                if (e.key === 'ArrowLeft') {
                    prev();
                    restart();
                } else if (e.key === 'ArrowRight') {
                    next();
                    restart();
                }
            });

            buildDots();
            render();
            start();
        })();
    </script>
</body>
</html>
